<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AWB Tracker">
<title>AWB Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0a0f;color:#f0f0f5;font-family:'DM Sans',-apple-system,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
body{padding-bottom:60px}
.wrap{max-width:680px;margin:0 auto;padding:0 16px}
.header{padding:32px 0 22px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:24px;gap:12px}
.header h1{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:#f0f0f5;letter-spacing:-0.3px}
.header-sub{font-size:12px;color:#555570;margin-top:5px;line-height:1.6}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.sync-btn{background:#1a1a24;border:1px solid rgba(255,255,255,0.12);color:#f0f0f5;border-radius:8px;padding:8px 14px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background 0.2s}
.sync-btn:hover{background:#111118}
.sync-status{font-size:11px;color:#555570;text-align:right}
.sync-status.ok{color:#22c55e}
.sync-status.err{color:#ef4444}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#111118;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px 16px}
.stat-n{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:#f0f0f5;line-height:1}
.stat-n.orange{color:#f97316}
.stat-n.green{color:#22c55e}
.stat-n.red{color:#ef4444}
.stat-l{font-size:11px;color:#555570;margin-top:6px;text-transform:uppercase;letter-spacing:0.6px}
.add-card{background:#111118;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:16px;margin-bottom:20px}
.add-label{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:#444460;margin-bottom:12px}
.add-row{display:flex;gap:8px;flex-wrap:wrap}
.add-row select,.add-row input{background:#0a0a0f;border:1px solid rgba(255,255,255,0.12);color:#f0f0f5;border-radius:8px;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.add-row select:focus,.add-row input:focus{border-color:rgba(255,255,255,0.3)}
.add-row select{width:110px}
.awb-in{flex:1;min-width:150px;font-family:'DM Mono',monospace!important;font-size:13px!important}
.ref-in{width:160px}
@media(max-width:500px){.ref-in{width:100%}}
.add-btn{background:#f0f0f5;color:#0a0a0f;border:none;border-radius:8px;padding:9px 20px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity 0.2s}
.add-btn:hover{opacity:0.85}
.add-btn:disabled{opacity:0.4;cursor:not-allowed}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{background:#111118;border:1px solid rgba(255,255,255,0.07);color:#555570;border-radius:20px;padding:5px 14px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s}
.filter-btn.active,.filter-btn:hover{background:#1a1a24;border-color:rgba(255,255,255,0.15);color:#f0f0f5}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:#333350;margin-bottom:10px}
.shipments{display:flex;flex-direction:column;gap:8px}
.card{background:#111118;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;transition:border-color 0.2s;animation:fadeUp 0.25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card:hover{border-color:rgba(255,255,255,0.12)}
.card.c-delivered{border-left:3px solid #22c55e}
.card.c-transit{border-left:3px solid #f97316}
.card.c-attention{border-left:3px solid #ef4444}
.card.c-pending{border-left:3px solid #333350}
.carrier-dot{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;flex-shrink:0}
.dot-dhl{background:rgba(255,204,0,0.12);color:#FFCC00}
.dot-fedex{background:rgba(167,139,250,0.12);color:#a78bfa}
.dot-aramex{background:rgba(232,71,42,0.12);color:#f87060}
.card-body{flex:1;min-width:0}
.awb-num{font-family:'DM Mono',monospace;font-size:14px;color:#f0f0f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-ref{font-size:12px;color:#555570;margin-top:2px}
.card-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:6px}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.p-delivered{background:rgba(34,197,94,0.12);color:#22c55e}
.p-transit{background:rgba(249,115,22,0.12);color:#f97316}
.p-customs{background:rgba(239,68,68,0.12);color:#ef4444}
.p-outfor{background:rgba(96,165,250,0.12);color:#60a5fa}
.p-attempted{background:rgba(239,68,68,0.12);color:#ef4444}
.p-pending{background:rgba(85,85,112,0.15);color:#555570}
.date-txt{font-size:11px;color:#333350}
.src-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.04);color:#333350;font-family:'DM Mono',monospace}
.card-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.track-btn{background:#1a1a24;border:1px solid rgba(255,255,255,0.12);color:#f0f0f5;border-radius:8px;padding:6px 12px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;display:inline-block;transition:background 0.15s}
.track-btn:hover{background:#0a0a0f}
.del-btn{background:none;border:1px solid transparent;color:#333350;border-radius:8px;padding:6px 9px;font-size:15px;cursor:pointer;transition:all 0.15s;line-height:1}
.del-btn:hover{color:#ef4444;border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.08)}
.loading{text-align:center;padding:48px 20px;color:#555570;font-size:14px}
.empty{text-align:center;padding:48px 20px;color:#555570;font-size:14px}
.empty p{font-size:12px;color:#333350;margin-top:6px}
.banner{background:#111118;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.banner p{font-size:13px;color:#888890;line-height:1.5}
.banner strong{color:#f0f0f5}
.banner-close{background:none;border:none;color:#444460;font-size:20px;cursor:pointer}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#f0f0f5;color:#0a0a0f;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;z-index:999;white-space:nowrap;transition:opacity 0.25s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div id="banner" class="banner" style="display:none">
    <p><strong>Add to home screen</strong> — tap Share in Safari then "Add to Home Screen"</p>
    <button class="banner-close" onclick="dismissBanner()">&#215;</button>
  </div>
  <div class="header">
    <div>
      <h1>AWB Tracker</h1>
      <div class="header-sub">rhrahme@gmail.com<br>awb.tracking11@gmail.com</div>
    </div>
    <div class="header-right">
      <button class="sync-btn" onclick="openClaude()"><span id="sync-icon">&#8635;</span> Sync Gmail</button>
      <span class="sync-status" id="sync-status">Connecting...</span>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n orange" id="s-transit">0</div><div class="stat-l">In transit</div></div>
    <div class="stat"><div class="stat-n green" id="s-delivered">0</div><div class="stat-l">Delivered</div></div>
    <div class="stat"><div class="stat-n red" id="s-attention">0</div><div class="stat-l">Attention</div></div>
  </div>
  <div class="add-card">
    <div class="add-label">Add shipment manually</div>
    <div class="add-row">
      <select id="carrier-sel"><option value="DHL">DHL</option><option value="FedEx">FedEx</option><option value="Aramex">Aramex</option></select>
      <input class="awb-in" id="awb-input" type="text" placeholder="AWB / tracking number" autocomplete="off">
      <input class="ref-in" id="ref-input" type="text" placeholder="Reference (optional)">
      <button class="add-btn" id="add-btn" onclick="addManual()">+ Add</button>
    </div>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('DHL',this)">DHL</button>
    <button class="filter-btn" onclick="setFilter('FedEx',this)">FedEx</button>
    <button class="filter-btn" onclick="setFilter('Aramex',this)">Aramex</button>
    <button class="filter-btn" onclick="setFilter('transit',this)">In transit</button>
    <button class="filter-btn" onclick="setFilter('delivered',this)">Delivered</button>
    <button class="filter-btn" onclick="setFilter('attention',this)">Attention</button>
  </div>
  <div class="section-label" id="list-label">All shipments</div>
  <div class="shipments" id="list"><div class="loading">Connecting to database...</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
var SURL='https://qxytwpldmxcybpdkkffv.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4eXR3cGxkbXhjeWJwZGtrZmZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDc5NjQsImV4cCI6MjA5MTgyMzk2NH0._byhyQrgKYKY0tejGpHssT9bEOKl851Cq6Cf6KH9uhs';
var TBL='shipments';
var shipments=[];
var filter='all';
var H={'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=representation'};

function fetchShipments(){
  fetch(SURL+'/rest/v1/'+TBL+'?order=created_at.desc',{headers:H})
  .then(function(r){if(!r.ok)throw new Error(r.status+' '+r.statusText);return r.json();})
  .then(function(data){shipments=data;setStatus('Connected','ok');render();})
  .catch(function(e){setStatus('Error: '+e.message,'err');document.getElementById('list').innerHTML='<div class="empty">Could not connect<p>'+e.message+'</p></div>';});
}

function insertShipment(s){
  return fetch(SURL+'/rest/v1/'+TBL,{method:'POST',headers:H,body:JSON.stringify(s)})
  .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t);});});
}

function deleteShipment(id){
  return fetch(SURL+'/rest/v1/'+TBL+'?id=eq.'+id,{method:'DELETE',headers:H})
  .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t);});});
}

function setStatus(m,c){var e=document.getElementById('sync-status');e.textContent=m;e.className='sync-status'+(c?' '+c:'');}

function pillClass(s){
  var l=(s||'').toLowerCase();
  if(l.indexOf('out for')>=0)return 'pill p-outfor';
  if(l.indexOf('delivered')>=0)return 'pill p-delivered';
  if(l.indexOf('transit')>=0||l.indexOf('shipped')>=0)return 'pill p-transit';
  if(l.indexOf('customs')>=0||l.indexOf('hold')>=0)return 'pill p-customs';
  if(l.indexOf('attempt')>=0||l.indexOf('missed')>=0)return 'pill p-attempted';
  return 'pill p-pending';
}

function accent(s){
  var l=(s||'').toLowerCase();
  if(l.indexOf('delivered')>=0)return 'c-delivered';
  if(l.indexOf('attempt')>=0||l.indexOf('customs')>=0||l.indexOf('hold')>=0||l.indexOf('missed')>=0)return 'c-attention';
  if(l.indexOf('transit')>=0||l.indexOf('shipped')>=0||l.indexOf('out for')>=0)return 'c-transit';
  return 'c-pending';
}

function dotC(c){return{DHL:'dot-dhl',FedEx:'dot-fedex',Aramex:'dot-aramex'}[c]||'dot-dhl';}
function dotL(c){return{DHL:'DHL',FedEx:'FDX',Aramex:'AMX'}[c]||c;}

function tUrl(carrier,awb){
  if(carrier==='DHL')return'https://www.dhl.com/en/express/tracking.html?AWB='+awb+'&brand=DHL';
  if(carrier==='FedEx')return'https://www.fedex.com/fedextrack/?trknbr='+awb;
  return'https://www.aramex.com/us/en/track/results?ShipmentNumber='+awb;
}

function getFiltered(){
  if(filter==='all')return shipments;
  if(filter==='DHL'||filter==='FedEx'||filter==='Aramex')return shipments.filter(function(s){return s.carrier===filter;});
  if(filter==='delivered')return shipments.filter(function(s){return s.status.toLowerCase().indexOf('delivered')>=0;});
  if(filter==='transit')return shipments.filter(function(s){var l=s.status.toLowerCase();return l.indexOf('transit')>=0||l.indexOf('out for')>=0||l.indexOf('shipped')>=0;});
  if(filter==='attention')return shipments.filter(function(s){var l=s.status.toLowerCase();return l.indexOf('customs')>=0||l.indexOf('attempt')>=0||l.indexOf('hold')>=0||l.indexOf('missed')>=0;});
  return shipments;
}

function render(){
  var delivered=shipments.filter(function(s){return s.status.toLowerCase().indexOf('delivered')>=0;}).length;
  var transit=shipments.filter(function(s){var l=s.status.toLowerCase();return l.indexOf('transit')>=0||l.indexOf('out for')>=0||l.indexOf('shipped')>=0;}).length;
  var attention=shipments.filter(function(s){var l=s.status.toLowerCase();return l.indexOf('customs')>=0||l.indexOf('attempt')>=0||l.indexOf('hold')>=0||l.indexOf('missed')>=0;}).length;
  document.getElementById('s-total').textContent=shipments.length;
  document.getElementById('s-transit').textContent=transit;
  document.getElementById('s-delivered').textContent=delivered;
  document.getElementById('s-attention').textContent=attention;
  var data=getFiltered();
  var list=document.getElementById('list');
  if(!data.length){list.innerHTML='<div class="empty">No shipments<p>Add an AWB above or sync Gmail</p></div>';return;}
  var html='';
  for(var i=0;i<data.length;i++){
    var s=data[i];
    html+='<div class="card '+accent(s.status)+'">';
    html+='<div class="carrier-dot '+dotC(s.carrier)+'">'+dotL(s.carrier)+'</div>';
    html+='<div class="card-body">';
    html+='<div class="awb-num">'+s.awb+'</div>';
    if(s.ref)html+='<div class="card-ref">'+s.ref+'</div>';
    html+='<div class="card-meta">';
    html+='<span class="'+pillClass(s.status)+'">'+s.status+'</span>';
    html+='<span class="date-txt">'+(s.date||'')+'</span>';
    html+='<span class="src-tag">'+(s.source==='gmail'?'gmail':'manual')+'</span>';
    html+='</div></div>';
    html+='<div class="card-actions">';
    html+='<a class="track-btn" href="'+tUrl(s.carrier,s.awb)+'" target="_blank" rel="noopener">Track</a>';
    html+='<button class="del-btn" onclick="remove('+s.id+')">x</button>';
    html+='</div></div>';
  }
  list.innerHTML=html;
}

function setFilter(f,btn){
  filter=f;
  var btns=document.querySelectorAll('.filter-btn');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  btn.classList.add('active');
  var labels={all:'All shipments',DHL:'DHL',FedEx:'FedEx',Aramex:'Aramex',transit:'In transit',delivered:'Delivered',attention:'Needs attention'};
  document.getElementById('list-label').textContent=labels[f]||'Shipments';
  render();
}

function addManual(){
  var awb=document.getElementById('awb-input').value.trim();
  var carrier=document.getElementById('carrier-sel').value;
  var ref=document.getElementById('ref-input').value.trim();
  if(!awb){toast('Enter an AWB number');return;}
  for(var i=0;i<shipments.length;i++){if(shipments[i].awb===awb){toast('Already tracking '+awb);return;}}
  var btn=document.getElementById('add-btn');
  btn.disabled=true;btn.textContent='Saving...';
  var now=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  insertShipment({carrier:carrier,awb:awb,ref:ref,status:'Pending lookup',date:now,source:'manual'})
  .then(function(){
    document.getElementById('awb-input').value='';
    document.getElementById('ref-input').value='';
    fetchShipments();
    toast('Added '+carrier+' '+awb);
  })
  .catch(function(e){toast('Error: '+e.message);})
  .finally(function(){btn.disabled=false;btn.textContent='+ Add';});
}

function remove(id){
  deleteShipment(id).then(function(){fetchShipments();toast('Removed');}).catch(function(e){toast('Error: '+e.message);});
}

function openClaude(){
  document.getElementById('sync-icon').classList.add('spin');
  setTimeout(function(){document.getElementById('sync-icon').classList.remove('spin');},2000);
  window.open('https://claude.ai','_blank');
}

function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},2500);
}

function checkBanner(){
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS&&!window.navigator.standalone&&!localStorage.getItem('awb_ok')){
    document.getElementById('banner').style.display='flex';
  }
}

function dismissBanner(){
  document.getElementById('banner').style.display='none';
  localStorage.setItem('awb_ok','1');
}

document.getElementById('awb-input').addEventListener('keydown',function(e){if(e.key==='Enter')addManual();});
checkBanner();
fetchShipments();
</script>
</body>
</html>
