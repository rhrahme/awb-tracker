<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AWB Tracker">
<title>AWB Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #0a0a0f; color: #f0f0f5;
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}
body { padding-bottom: 60px; }
.wrap { max-width: 680px; margin: 0 auto; padding: 0 16px; }

.header {
  padding: 32px 0 22px;
  display: flex; align-items: flex-start; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  margin-bottom: 24px; gap: 12px;
}
.header h1 { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: #f0f0f5; letter-spacing: -0.3px; }
.header-sub { font-size: 12px; color: #555570; margin-top: 5px; line-height: 1.6; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.sync-btn {
  background: #1a1a24; border: 1px solid rgba(255,255,255,0.12);
  color: #f0f0f5; border-radius: 8px; padding: 8px 14px;
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  white-space: nowrap; transition: background 0.2s;
}
.sync-btn:hover { background: #111118; }
.sync-status { font-size: 11px; color: #555570; text-align: right; }
.sync-status.ok { color: #22c55e; }
.sync-status.err { color: #ef4444; }
.spin { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 24px; }
@media(max-width:480px){ .stats { grid-template-columns: repeat(2,1fr); } }
.stat { background: #111118; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 14px 16px; }
.stat-n { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; color: #f0f0f5; line-height: 1; }
.stat-n.orange { color: #f97316; }
.stat-n.green  { color: #22c55e; }
.stat-n.red    { color: #ef4444; }
.stat-l { font-size: 11px; color: #555570; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.6px; }

.add-card { background: #111118; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
.add-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: #444460; margin-bottom: 12px; }
.add-row { display: flex; gap: 8px; flex-wrap: wrap; }
.add-row select, .add-row input {
  background: #0a0a0f; border: 1px solid rgba(255,255,255,0.12);
  color: #f0f0f5; border-radius: 8px; padding: 9px 12px;
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color 0.2s; -webkit-appearance: none;
}
.add-row select:focus, .add-row input:focus { border-color: rgba(255,255,255,0.3); }
.add-row select { width: 110px; }
.awb-in { flex: 1; min-width: 150px; font-family: 'DM Mono', monospace !important; font-size: 13px !important; }
.ref-in { width: 160px; }
@media(max-width:500px){ .ref-in { width: 100%; } }
.add-btn {
  background: #f0f0f5; color: #0a0a0f; border: none; border-radius: 8px;
  padding: 9px 20px; font-size: 14px; font-weight: 500;
  font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; transition: opacity 0.2s;
}
.add-btn:hover { opacity: 0.85; }
.add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.filter-btn {
  background: #111118; border: 1px solid rgba(255,255,255,0.07);
  color: #555570; border-radius: 20px; padding: 5px 14px;
  font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s;
}
.filter-btn.active, .filter-btn:hover { background: #1a1a24; border-color: rgba(255,255,255,0.15); color: #f0f0f5; }

.section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: #333350; margin-bottom: 10px; }
.shipments { display: flex; flex-direction: column; gap: 8px; }

.card {
  background: #111118; border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  transition: border-color 0.2s; animation: fadeUp 0.25s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.card:hover { border-color: rgba(255,255,255,0.12); }
.card.c-delivered { border-left: 3px solid #22c55e; }
.card.c-transit   { border-left: 3px solid #f97316; }
.card.c-attention { border-left: 3px solid #ef4444; }
.card.c-pending   { border-left: 3px solid #333350; }

.carrier-dot {
  width: 38px; height: 38px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; flex-shrink: 0;
}
.dot-dhl    { background: rgba(255,204,0,0.12);   color: #FFCC00; }
.dot-fedex  { background: rgba(167,139,250,0.12); color: #a78bfa; }
.dot-aramex { background: rgba(232,71,42,0.12);   color: #f87060; }

.card-body { flex: 1; min-width: 0; }
.awb-num { font-family: 'DM Mono', monospace; font-size: 14px; color: #f0f0f5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-ref { font-size: 12px; color: #555570; margin-top: 2px; }
.card-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-top: 6px; }
.pill { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.p-delivered { background: rgba(34,197,94,0.12);  color: #22c55e; }
.p-transit   { background: rgba(249,115,22,0.12); color: #f97316; }
.p-customs   { background: rgba(239,68,68,0.12);  color: #ef4444; }
.p-outfor    { background: rgba(96,165,250,0.12); color: #60a5fa; }
.p-attempted { background: rgba(239,68,68,0.12);  color: #ef4444; }
.p-pending   { background: rgba(85,85,112,0.15);  color: #555570; }
.date-txt { font-size: 11px; color: #333350; }
.src-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.04); color: #333350; font-family: 'DM Mono', monospace; }

.card-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.track-btn {
  background: #1a1a24; border: 1px solid rgba(255,255,255,0.12);
  color: #f0f0f5; border-radius: 8px; padding: 6px 12px;
  font-size: 12px; font-family: 'DM Sans', sans-serif;
  cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.15s;
}
.track-btn:hover { background: #0a0a0f; }
.del-btn {
  background: none; border: 1px solid transparent; color: #333350;
  border-radius: 8px; padding: 6px 9px; font-size: 15px; cursor: pointer; transition: all 0.15s; line-height: 1;
}
.del-btn:hover { color: #ef4444; border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); }

.loading { text-align: center; padding: 48px 20px; color: #555570; font-size: 14px; }
.loading .dots::after { content: '...'; animation: dots 1.5s steps(4,end) infinite; }
@keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }
.empty { text-align: center; padding: 48px 20px; color: #555570; font-size: 14px; }
.empty p { font-size: 12px; color: #333350; margin-top: 6px; }

.banner {
  background: #111118; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.banner p { font-size: 13px; color: #888890; line-height: 1.5; }
.banner strong { color: #f0f0f5; }
.banner-close { background: none; border: none; color: #444460; font-size: 20px; cursor: pointer; }
.banner-close:hover { color: #f0f0f5; }

.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #f0f0f5; color: #0a0a0f; padding: 10px 20px; border-radius: 8px;
  font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none;
  z-index: 999; white-space: nowrap; transition: opacity 0.25s;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">

  <div id="banner" class="banner" style="display:none">
    <p><strong>Add to home screen</strong> — tap Share in Safari then "Add to Home Screen"</p>
    <button class="banner-close" onclick="dismissBanner()">&#215;</button>
  </div>

  <div class="header">
    <div>
      <h1>AWB Tracker</h1>
      <div class="header-sub">rhrahme@gmail.com<br>awb.tracking11@gmail.com</div>
    </div>
    <div class="header-right">
      <button class="sync-btn" onclick="openClaude()">
        <span id="sync-icon">&#8635;</span> Sync Gmail
      </button>
      <span class="sync-status" id="sync-status">Loading...</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n orange" id="s-transit">—</div><div class="stat-l">In transit</div></div>
    <div class="stat"><div class="stat-n green" id="s-delivered">—</div><div class="stat-l">Delivered</div></div>
    <div class="stat"><div class="stat-n red" id="s-attention">—</div><div class="stat-l">Attention</div></div>
  </div>

  <div class="add-card">
    <div class="add-label">Add shipment manually</div>
    <div class="add-row">
      <select id="carrier-sel">
        <option value="DHL">DHL</option>
        <option value="FedEx">FedEx</option>
        <option value="Aramex">Aramex</option>
      </select>
      <input class="awb-in" id="awb-input" type="text" placeholder="AWB / tracking number" autocomplete="off">
      <input class="ref-in" id="ref-input" type="text" placeholder="Reference (optional)">
      <button class="add-btn" id="add-btn" onclick="addManual()">+ Add</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('DHL',this)">DHL</button>
    <button class="filter-btn" onclick="setFilter('FedEx',this)">FedEx</button>
    <button class="filter-btn" onclick="setFilter('Aramex',this)">Aramex</button>
    <button class="filter-btn" onclick="setFilter('transit',this)">In transit</button>
    <button class="filter-btn" onclick="setFilter('delivered',this)">Delivered</button>
    <button class="filter-btn" onclick="setFilter('attention',this)">Attention</button>
  </div>

  <div class="section-label" id="list-label">All shipments</div>
  <div class="shipments" id="list"><div class="loading"><span class="dots">Connecting to database</span></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://qxytwpldmxcybpdkkffv.supabase.co';
const SUPABASE_KEY =  eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4eXR3cGxkbXhjeWJwZGtrZmZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDc5NjQsImV4cCI6MjA5MTgyMzk2NH0._byhyQrgKYKY0tejGpHssT9bEOKl851Cq6Cf6KH9uhs;
const TABLE = 'Shipments';

let shipments = [];
let filter = 'all';

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function fetchShipments() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?order=created_at.desc`, { headers });
    if (!res.ok) throw new Error(await res.text());
    shipments = await res.json();
    setStatus('Connected ✓', 'ok');
    render();
  } catch(e) {
    setStatus('Connection error', 'err');
    console.error(e);
    document.getElementById('list').innerHTML = '<div class="empty">Could not connect to database<p>Check your internet connection and try refreshing</p></div>';
  }
}

async function insertShipment(s) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
    method: 'POST', headers,
    body: JSON.stringify({carrier:s.carrier, awb:s.awb, ref:s.ref, status:s.status, date:s.date, source:s.source})
  });
  if (!res.ok) throw new Error(await res.text());
  return await res.json();
}

async function deleteShipment(id) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${id}`, {
    method: 'DELETE', headers
  });
  if (!res.ok) throw new Error(await res.text());
}

function setStatus(msg, cls) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = 'sync-status' + (cls ? ' ' + cls : '');
}

function pillClass(s) {
  const l = (s||'').toLowerCase();
  if (l.includes('out for')) return 'pill p-outfor';
  if (l.includes('delivered')) return 'pill p-delivered';
  if (l.includes('transit')||l.includes('shipped')||l.includes('way')) return 'pill p-transit';
  if (l.includes('customs')||l.includes('hold')||l.includes('clearance')) return 'pill p-customs';
  if (l.includes('attempt')||l.includes('missed')||l.includes('exception')) return 'pill p-attempted';
  return 'pill p-pending';
}

function accent(s) {
  const l = (s||'').toLowerCase();
  if (l.includes('delivered')) return 'c-delivered';
  if (l.includes('attempt')||l.includes('customs')||l.includes('hold')||l.includes('missed')) return 'c-attention';
  if (l.includes('transit')||l.includes('shipped')||l.includes('out for')) return 'c-transit';
  return 'c-pending';
}

function dotClass(c) { return {DHL:'dot-dhl',FedEx:'dot-fedex',Aramex:'dot-aramex'}[c]||'dot-dhl'; }
function dotLabel(c) { return {DHL:'DHL',FedEx:'FDX',Aramex:'AMX'}[c]||c; }

function trackUrl(carrier, awb) {
  if (carrier==='DHL')   return `https://www.dhl.com/en/express/tracking.html?AWB=${awb}&brand=DHL`;
  if (carrier==='FedEx') return `https://www.fedex.com/fedextrack/?trknbr=${awb}`;
  return `https://www.aramex.com/us/en/track/results?ShipmentNumber=${awb}`;
}

function getFiltered() {
  if (filter==='all') return shipments;
  if (['DHL','FedEx','Aramex'].includes(filter)) return shipments.filter(s=>s.carrier===filter);
  if (filter==='delivered') return shipments.filter(s=>s.status.toLowerCase().includes('delivered'));
  if (filter==='transit') return shipments.filter(s=>{const l=s.status.toLowerCase();return l.includes('transit')||l.includes('out for')||l.includes('shipped');});
  if (filter==='attention') return shipments.filter(s=>{const l=s.status.toLowerCase();return l.includes('customs')||l.includes('attempt')||l.includes('hold')||l.includes('missed');});
  return shipments;
}

function render() {
  const delivered = shipments.filter(s=>s.status.toLowerCase().includes('delivered')).length;
  const transit   = shipments.filter(s=>{const l=s.status.toLowerCase();return l.includes('transit')||l.includes('out for')||l.includes('shipped');}).length;
  const attention = shipments.filter(s=>{const l=s.status.toLowerCase();return l.includes('customs')||l.includes('attempt')||l.includes('hold')||l.includes('missed');}).length;
  document.getElementById('s-total').textContent     = shipments.length;
  document.getElementById('s-transit').textContent   = transit;
  document.getElementById('s-delivered').textContent = delivered;
  document.getElementById('s-attention').textContent = attention;

  const data = getFiltered();
  const list = document.getElementById('list');
  if (!data.length) {
    list.innerHTML = '<div class="empty">No shipments<p>Add an AWB above or sync Gmail via Claude</p></div>';
    return;
  }
  list.innerHTML = data.map(s => `
    <div class="card ${accent(s.status)}">
      <div class="carrier-dot ${dotClass(s.carrier)}">${dotLabel(s.carrier)}</div>
      <div class="card-body">
        <div class="awb-num">${s.awb}</div>
        ${s.ref?`<div class="card-ref">${s.ref}</div>`:''}
        <div class="card-meta">
          <span class="${pillClass(s.status)}">${s.status}</span>
          <span class="date-txt">${s.date||''}</span>
          <span class="src-tag">${s.source==='gmail'?'✉ gmail':'+ manual'}</span>
        </div>
      </div>
      <div class="card-actions">
        <a class="track-btn" href="${trackUrl(s.carrier,s.awb)}" target="_blank" rel="noopener">Track ↗</a>
        <button class="del-btn" onclick="remove('${s.id}')">&#215;</button>
      </div>
    </div>`).join('');
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const labels={all:'All shipments',DHL:'DHL shipments',FedEx:'FedEx shipments',Aramex:'Aramex shipments',transit:'In transit',delivered:'Delivered',attention:'Needs attention'};
  document.getElementById('list-label').textContent = labels[f]||'Shipments';
  render();
}

async function addManual() {
  const awb = document.getElementById('awb-input').value.trim();
  const carrier = document.getElementById('carrier-sel').value;
  const ref = document.getElementById('ref-input').value.trim();
  if (!awb) { toast('Enter an AWB number'); return; }
  if (shipments.find(s=>s.awb===awb)) { toast('Already tracking '+awb); return; }
  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  const now = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  try {
    const result = await insertShipment({carrier,awb,ref,status:'Pending lookup',date:now,source:'manual'});
    document.getElementById('awb-input').value='';
    document.getElementById('ref-input').value='';
    await fetchShipments();
    toast('Added '+carrier+' '+awb);
  } catch(e) {
    toast('Error saving — try again');
    console.error(e);
  }
  btn.disabled = false; btn.textContent = '+ Add';
}

async function remove(id) {
  try {
    await deleteShipment(id);
    await fetchShipments();
    toast('Removed');
  } catch(e) {
    toast('Error removing');
  }
}

function openClaude() {
  document.getElementById('sync-icon').classList.add('spin');
  setTimeout(()=>document.getElementById('sync-icon').classList.remove('spin'),2000);
  window.open('https://claude.ai','_blank');
}

function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2500);
}

function checkBanner() {
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if (isIOS&&!window.navigator.standalone&&!localStorage.getItem('awb_ok')) {
    document.getElementById('banner').style.display='flex';
  }
}

function dismissBanner() {
  document.getElementById('banner').style.display='none';
  localStorage.setItem('awb_ok','1');
}

document.getElementById('awb-input').addEventListener('keydown',e=>{ if(e.key==='Enter') addManual(); });

checkBanner();
fetchShipments();
</script>
</body>
</html>
